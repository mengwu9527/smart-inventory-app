name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Create gradle.properties with Kotlin 2.0.0
        working-directory: ./client/android
        run: |
          if [ -f gradle.properties ]; then
            # Remove any existing kotlin.version line
            sed -i '/kotlin\.version/d' gradle.properties
            sed -i '/kotlin\.code\.style/d' gradle.properties
          fi
          # Add Kotlin version at the top of the file
          echo "kotlin.version=2.0.0" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties

      - name: Build Release APK with Expo
        working-directory: ./client
        run: npx expo run:android --variant release --no-install
        env:
          NODE_BINARY: /usr/bin/node
          EXPO_NO_DOTENV: "1"

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-inventory-app
          path: client/android/app/build/outputs/apk/**/*.apk
