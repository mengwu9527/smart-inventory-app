name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        working-directory: ./client
        run: npx expo prebuild --platform android --clean

      - name: Fix Kotlin version for Expo SDK 54
        working-directory: ./client/android
        run: |
          echo "" >> gradle.properties
          echo "# Kotlin version for Expo SDK 54 (requires Kotlin 2.0.0+)" >> gradle.properties
          echo "kotlin.version=2.0.0" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties

      - name: Build Release APK
        working-directory: ./client/android
        env:
          NODE_BINARY: /usr/bin/node
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-inventory-app
          path: client/android/app/build/outputs/apk/release/app-release.apk
