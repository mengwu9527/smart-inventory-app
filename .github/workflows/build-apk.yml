name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create symlink for Metro path
        run: ln -s client/node_modules node_modules

      - name: Install dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Fix Kotlin version in Android config
        working-directory: ./client/android
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/kotlin\.version/d' gradle.properties
            sed -i '/kotlin\.code\.style/d' gradle.properties
          fi
          echo "kotlin.version=2.0.21" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          
          if [ -f build.gradle ]; then
            if ! grep -q "ext {" build.gradle; then
              sed -i '/buildscript {/a\  ext {\n    kotlinVersion = "2.0.21"\n    kotlin_version = "2.0.21"\n  }' build.gradle
            fi
            sed -i "s/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')/classpath(\"org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21\")/" build.gradle
          fi

      - name: Build Release APK
        working-directory: ./client/android
        env:
          NODE_BINARY: /usr/bin/node
        run: ./gradlew assembleRelease

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-inventory-app-release
          path: client/android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Smart Inventory App v1.0.${{ github.run_number }}
          files: client/android/app/build/outputs/apk/release/app-release.apk
          body: |
            ## 智慧进销存 App
            
            本地离线版本，无需服务器
            
            ### 下载说明
            在 Assets 中下载 app-release.apk 文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
