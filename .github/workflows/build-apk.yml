name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Fix Kotlin version in Android config
        working-directory: ./client/android
        run: |
          # Update gradle.properties
          if [ -f gradle.properties ]; then
            sed -i '/kotlin\.version/d' gradle.properties
            sed -i '/kotlin\.code\.style/d' gradle.properties
          fi
          echo "kotlin.version=2.0.0" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          
          # Update build.gradle to specify Kotlin plugin version explicitly
          if [ -f build.gradle ]; then
            sed -i "s/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.0')/" build.gradle
            echo "Updated build.gradle:"
            grep -n "kotlin-gradle-plugin" build.gradle || echo "No kotlin-gradle-plugin found"
          fi

      - name: Build Release APK
        working-directory: ./client/android
        env:
          NODE_BINARY: /usr/bin/node
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-inventory-app
          path: client/android/app/build/outputs/apk/release/app-release.apk
