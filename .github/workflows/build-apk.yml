name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create symlink for Metro path
        run: ln -s client/node_modules node_modules

      - name: Install dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Fix Kotlin version in Android config
        working-directory: ./client/android
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/kotlin\.version/d' gradle.properties
            sed -i '/kotlin\.code\.style/d' gradle.properties
          fi
          echo "kotlin.version=2.0.21" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          
          if [ -f build.gradle ]; then
            if ! grep -q "ext {" build.gradle; then
              sed -i '/buildscript {/a\  ext {\n    kotlinVersion = "2.0.21"\n    kotlin_version = "2.0.21"\n  }' build.gradle
            fi
            sed -i "s/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')/classpath(\"org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21\")/" build.gradle
          fi

      - name: Build Debug APK
        working-directory: ./client/android
        env:
          NODE_BINARY: /usr/bin/node
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-inventory-app-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
